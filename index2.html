<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>También era dev, eradev2.com</title>
    
    <!-- Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

<body>

    <header>

    <main class="container">

        <section class="hero-section">
            <h1 class="text-glow">

    <footer>
        <div class="container footer-content">
            <div class="social-links-box" style="display: flex; flex-direction: column; gap: 1rem;">

                    <a href="#" title="Data Object">

                    </a>

                <p class="footer-build-info" id="build-info">
                    V2.0.0-ALPHA-BUILD // 14 MAR

            <div class="footer-brand">
                <p>© 2026 ERADEV2.COM</p>

            </div>

    <!-- Scripts -->
