name: Actualizar datos ONPE

on:
  schedule:
    - cron: '0 * * * *'   # cada hora en punto
  workflow_dispatch:        # también manual desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Correr script ONPE
        run: node src/scripts/porcentajesPresidencialesPorRegion.mjs

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/scripts/porcentajesPresidencialesPorRegion.json
          git diff --staged --quiet && echo "Sin cambios" || (
            git commit -m "chore: actualizar datos ONPE $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          )
